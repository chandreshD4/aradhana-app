name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Cordova and Gradle
      run: |
        npm install -g cordova
        sudo apt-get update && sudo apt-get install -y gradle

    - name: Remove Old Platform and Add Android 10
      run: |
        cordova platform remove android --silent || true
        cordova platform add android@10.1.2

    - name: Build APK (Debug)
      run: cordova build android --debug

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: Aradhana-Bhakti-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
