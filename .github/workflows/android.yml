name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Disable Plugin and Add Android Platform
      run: |
        cordova platform add android@10.1.2 --no-fetch || cordova platform add android@10.1.2

    - name: Build APK (Debug)
      run: cordova build android --debug --device

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: Aradhana-Bhakti-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
